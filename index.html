<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório PDV - Dark Mode</title>
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body>

    <h1>📊 Gerenciador de Relatórios PDV</h1>

    <div class="summary-card">
        <div class="stat-item">Média de Tempo<span id="avg-day">0 min</span></div>
        <div class="stat-item">Total de OCs<span id="total-ocs">0</span></div>
        <div class="stat-item">Status (B/R/R)<span id="status-counts">0 / 0 / 0</span></div>
    </div>

    <div class="main-container">
        <div class="section-box">
            <h3>➕ Preenchimento Manual</h3>
            <div class="manual-form">
                <input type="text" id="m-pdv" placeholder="Nome do PDV">
                <input type="date" id="m-data">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <label>Início:</label><input type="time" id="m-inicio">
                    <label>Fim:</label><input type="time" id="m-fim">
                </div>
                <button onclick="addManualRow()" class="btn-add">Adicionar Linha</button>
            </div>
        </div>

        <div class="section-box">
            <h3>📁 Upload de Planilha</h3>
            <input type="file" id="file-upload" accept=".xlsx, .xls, .csv">
            <p style="font-size: 0.75rem; color: #8b949e; margin-top: 10px;">
                Colunas: PDV, Data, HoraInicio, HoraFim
            </p>
        </div>
    </div>

    <table id="data-table">
        <thead>
            <tr>
                <th>PDV</th>
                <th>Data</th>
                <th>Hora Início</th>
                <th>Hora Fim</th>
                <th>Tempo Gasto</th>
                <th>Status</th>
                <th>Observação</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
