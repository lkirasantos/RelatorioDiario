<div class="summary-card">
    <div class="stat-item">Média do Dia<span id="avg-day">0 min</span></div>
    <div class="stat-item">Total OCs<span id="total-ocs">0</span></div>
    <div id="status-counts" class="stat-item">B/R/R<span>0 / 0 / 0</span></div>
</div>

<div class="upload-section" style="margin-bottom: 20px;">
    <h3>Adicionar Manualmente:</h3>
    <input type="text" id="m-pdv" placeholder="PDV">
    <input type="date" id="m-data">
    <input type="time" id="m-inicio">
    <input type="time" id="m-fim">
    <button onclick="addManualRow()">+ Adicionar</button>
    
    <span style="margin-left: 20px;">Ou Importar:</span>
    <input type="file" id="file-upload" accept=".xlsx, .xls, .csv">
</div>
