<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatorio Diario</title>
    <link rel="stylesheet" href="style.css?v=11">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>📊 Gestão PDV</h1>

    <div class="summary-card">
        <div class="stat-item">Média Dia<span id="avg-day">0 min</span></div>
        <div class="stat-item">Total OCs<span id="total-ocs">0</span></div>
        <div class="stat-item">Média Mês<span id="avg-month">0 min</span></div>
        <div class="stat-item">Status Mês<span id="status-month">-</span></div>
    </div>

    <div class="main-container">
        <div class="section-box launch-box">
            <h3>📝 Lançamento</h3>
            <div class="manual-form">
                <select id="m-pdv">
                    <option value="PDV 01">PDV 01</option>
                    <option value="PDV 02">PDV 02</option>
                    <option value="PDV 03">PDV 03</option>
                </select>
                <input type="date" id="m-data">
                <input type="time" id="m-inicio">
                <input type="time" id="m-fim">
                <button id="btn-registrar" onclick="addManualRow()">Registrar</button>
            </div>
        </div>
        <div class="section-box chart-box">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <div class="actions">
        <button onclick="finalizarDia()" class="btn-purple">🏁 Finalizar Dia</button>
        <button onclick="exportarExcel()" class="btn-dark">📥 Baixar Excel</button>
        <button onclick="limparTudo()" class="btn-red">⚠️ Resetar</button>
    </div>

    <table id="data-table">
        <thead>
            <tr>
                <th>PDV</th><th>Data</th><th>Início</th><th>Fim</th><th>Tempo</th><th>Status</th><th>Obs</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js?v=11"></script>
</body>
</html>
